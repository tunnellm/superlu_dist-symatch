name: Apply SymLDL v2 factor pipeline changes

on:
  push:
    branches:
      - symldl-v2-factor-pipeline-gpt

permissions:
  contents: write

jobs:
  apply:
    if: "!contains(github.event.head_commit.message, '[symv2-patch-applied]')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: symldl-v2-factor-pipeline-gpt
          fetch-depth: 0
      - name: Apply source edits
        run: |
          python3 tools/patch_symv2_01_state.py
          python3 tools/patch_symv2_02_prepack.py
          python3 tools/patch_symv2_03_exchange.py
      - name: Remove one-shot patch scaffolding
        run: |
          rm -f tools/patch_symv2_01_state.py
          rm -f tools/patch_symv2_02_prepack.py
          rm -f tools/patch_symv2_03_exchange.py
          rm -f .github/workflows/apply-symv2-factor-pipeline.yml
      - name: Commit applied source changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --check
          git commit -m "Optimize SymLDL v2 fragment exchange [symv2-patch-applied]"
          git push origin HEAD:symldl-v2-factor-pipeline-gpt
